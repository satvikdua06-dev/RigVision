rules:
  - id: PPE-001
    type: ppe
    description: Hard hat required in all zones
    required_ppe: [hardhat]
    severity: HIGH

  - id: PPE-002
    type: ppe
    description: Safety vest required in all zones
    required_ppe: [vest]
    severity: MEDIUM

  - id: PPE-003
    type: ppe
    description: Goggles required in all zones
    required_ppe: [goggles]
    severity: LOW

  - id: OCC-001
    type: occupancy
    description: Maximum 6 persons per zone
    max_occupancy: 6
    severity: HIGH

  - id: ENV-001
    type: environment
    description: H2S gas concentration above safe limit
    sensor_type: gas_h2s
    threshold: 10.0
    severity: CRITICAL

  - id: ENV-002
    type: environment
    description: Temperature above safe operating limit
    sensor_type: temperature
    threshold: 45.0
    severity: HIGH

  - id: ENV-003
    type: environment
    description: Noise level above hearing protection threshold
    sensor_type: noise
    threshold: 85.0
    severity: MEDIUM
