# ──────────────────────────────────────────────────────────
# RigVision-3D — Docker Compose
# ──────────────────────────────────────────────────────────

services:
  redis:
    image: redis:7-alpine
    container_name: rigvision-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: rigvision-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rigvision
      POSTGRES_USER: rigvision
      POSTGRES_PASSWORD: rigvision_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rigvision"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: rigvision-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/rigvision_neo4j
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    
  chromadb:
    image: chromadb/chroma:latest
    container_name: rigvision-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  emqx:
    image: emqx/emqx:latest
    container_name: rigvision-emqx
    ports:
      - "1883:1883"
      - "8083:8083"
      - "18083:18083"
    environment:
      EMQX_NAME: rigvision
      EMQX_HOST: 127.0.0.1
    volumes:
      - emqx_data:/opt/emqx/data
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  neo4j_data:
  emqx_data:
  chroma_data: