# ──────────────────────────────────────────────────────────
# RigVision-3D — Docker Compose
# ──────────────────────────────────────────────────────────
# Spins up all infrastructure services.
# Usage:
#   docker compose up -d        # start all services
#   docker compose down         # stop all services
#   docker compose logs redis   # view logs for a service
# ──────────────────────────────────────────────────────────

services:
  # ── Redis 7 ──
  # In-memory key-value store used as the real-time state bridge.
  # CV pipeline writes person positions here, backend reads and
  # pushes to the browser via WebSocket.
  # Why Redis? Sub-millisecond reads. Perfect for 10Hz data.
  redis:
    image: redis:7-alpine
    container_name: rigvision-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ── PostgreSQL 16 + TimescaleDB ──
  # Relational database extended with TimescaleDB for efficient
  # time-series queries (sensor readings over time).
  # Why TimescaleDB? It turns Postgres into a time-series DB
  # with automatic data partitioning by time.
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: rigvision-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rigvision
      POSTGRES_USER: rigvision
      POSTGRES_PASSWORD: rigvision_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rigvision"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Neo4j 5 ──
  # Graph database for the Knowledge Graph.
  # Stores relationships between equipment, failure modes,
  # symptoms, and maintenance procedures.
  # Why Neo4j? Relationships are first-class citizens,
  # making queries like "what could cause this symptom?" natural.
  neo4j:
    image: neo4j:5-community
    container_name: rigvision-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/rigvision_neo4j
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── EMQX (MQTT Broker) ──
  # Message broker for IoT sensor data.
  # Sensors publish readings via MQTT topics like:
  #   rig/zone_a/temperature/reading
  # Why MQTT? Lightweight protocol designed for IoT devices.
  # EMQX handles thousands of sensors with low latency.
  emqx:
    image: emqx/emqx:latest
    container_name: rigvision-emqx
    ports:
      - "1883:1883"     # MQTT protocol
      - "8083:8083"     # WebSocket
      - "18083:18083"   # Dashboard UI
    environment:
      EMQX_NAME: rigvision
      EMQX_HOST: 127.0.0.1
    volumes:
      - emqx_data:/opt/emqx/data
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  neo4j_data:
  emqx_data:
